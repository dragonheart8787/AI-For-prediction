# Jobs（在 Actions 分頁應看到 3 個）：
#   1) test        — matrix Ubuntu/Windows × Py3.11/3.12，pytest tests/
#   2) test-automl-torch — Ubuntu，pytest tests/test_automl_torch.py
#   3) quality     — compileall（全部已追蹤 .py）、import smoke、ruff tests/、scripts/check_repo_policy.py
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-core.txt

      - name: Run tests
        env:
          PYTHONIOENCODING: utf-8
          PREDICT_AI_DEMO_FAST: "1"
        run: |
          python -m pytest tests/ -q --tb=short

  test-automl-torch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install core + automl/torch
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-core.txt -r requirements-automl.txt
      - name: Run automl & torch tests
        env:
          PYTHONIOENCODING: utf-8
        run: |
          python -m pytest tests/test_automl_torch.py -q --tb=short

  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install core + ruff
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-core.txt ruff
      - name: Repo policy (root layout + version sync)
        run: python scripts/check_repo_policy.py
      - name: compileall (all tracked .py)
        shell: bash
        run: |
          mapfile -t py_files < <(git ls-files '*.py')
          if [ "${#py_files[@]}" -eq 0 ]; then echo "no py files"; exit 1; fi
          python -m compileall -q "${py_files[@]}"
      - name: Import smoke
        run: |
          python -c "from unified_predict import UnifiedPredictor; from schema_infer import align_sources; from experiment_log import log_training_event; print('import_smoke_ok')"
      - name: Ruff (tests)
        run: python -m ruff check tests/
