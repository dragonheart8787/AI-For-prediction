name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-core.txt

      - name: Run tests
        env:
          PYTHONIOENCODING: utf-8
          PREDICT_AI_DEMO_FAST: "1"
        run: |
          python -m pytest tests/ -q --tb=short

  test-automl-torch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install core + automl/torch
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-core.txt -r requirements-automl.txt
      - name: Run automl & torch tests
        env:
          PYTHONIOENCODING: utf-8
        run: |
          python -m pytest tests/test_automl_torch.py -q --tb=short

  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install core + ruff
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-core.txt ruff
      - name: compileall (mainline)
        run: |
          python -m compileall -q \
            crawler_train_pipeline.py unified_predict.py launch_predict_service.py demo_backtest_all.py \
            runtime_paths.py schema_infer.py feature_expansion.py prediction_contracts.py prediction_intervals.py \
            model_explainability.py pipeline_run_context.py experiment_log.py artifact_registry.py \
            universal_predictor.py training_data_store.py prediction_target_advisor.py \
            data_connectors validation model_serving automl nn_models
      - name: Import smoke
        run: |
          python -c "from unified_predict import UnifiedPredictor; from schema_infer import align_sources; from experiment_log import log_training_event; print('import_smoke_ok')"
      - name: Ruff (tests)
        run: python -m ruff check tests/
