# 批次訓練設定範例
#
# ┌─ 大量訓練（60 筆 ≈ 舊版 3 筆的 20 倍）→ 直接用：
# │    config/batch_train.yaml
# └─ 快速 3 筆 → config/batch_train.small.yaml
#
# 執行：
#   python scripts/batch_train.py --config config/batch_train.example.yaml --dry-run

schema: config/prediction_schema.yaml

defaults: {}

# 方式 A：明確 job 列表（有內容時不會讀 matrix）
jobs:
  - { task: stock_price_next, model: linear }
  - { task: stock_price_next, model: xgboost }
  - { task: temperature_next, model: linear }

# 方式 B：笛卡兒積（60 筆請改看 batch_train.yaml；此處僅示範結構）
# jobs: []
# matrix:
#   tasks: [stock_price_next, stock_return, temperature_next]
#   models: [linear, lightgbm]
# exclude:
#   - { task: stock_return, model: lightgbm }
