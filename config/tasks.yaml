version: 1

domains:
  - id: financial
    display_name: 股票投資決策
    enabled: true
    horizons: [1, 5, 10, 20]
    metrics: [RMSE, MAE]
  - id: weather
    display_name: 天氣預報
    enabled: true
    horizons: [1, 5, 10]
    metrics: [RMSE, MAE]
  - id: medical
    display_name: 疾病傳播預測
    enabled: true
    horizons: [1, 5, 10]
    metrics: [RMSE, MAE]
  - id: energy
    display_name: 能源需求預測
    enabled: true
    horizons: [1, 5, 10]
    metrics: [RMSE, MAE]
  - id: custom
    display_name: 通用任務（自定義）
    enabled: true
    horizons: [1, 5, 10]
    metrics: [RMSE, MAE]

routing:
  default_model: linear
  baselines:
    - linear
    - xgboost
    - lightgbm
  enable_fusion: true
  fusion:
    weights_strategy: equal

cpu_optimization:
  use_numba: true
  use_modin: false
  onnx_runtime:
    enabled: true
    intra_op_num_threads: 0
    inter_op_num_threads: 0
    graph_optimization_level: ORT_ENABLE_ALL

preprocessing:
  normalize_numeric: true
  impute_missing: median
  categorical_encoding: onehot
