version: '3.9'
services:
  web:
    build: .
    container_name: superfusionagi-web
    ports:
      - "8080:8080"
    environment:
      - APP_HOST=0.0.0.0
      - APP_PORT=8080
      - PYTHONIOENCODING=utf-8
      - LOG_LEVEL=INFO
      - ENABLE_PLUGIN_AUTODISCOVERY=true
    volumes:
      - ./collected_data:/app/collected_data
      - ./system_results:/app/system_results
      - ./enhanced_data:/app/enhanced_data
    command: ["python", "web_server.py"]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
